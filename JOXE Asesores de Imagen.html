<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOXE Asesores de Imagen · Soacha, San Mateo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Manrope:wght@300;400;500&family=Italiana&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --noir: #0C0C0C;
    --ivory: #F5F1EA;
    --bronze: #C29E66;
    --display: 'Marcellus', serif;
    --sans: 'Outfit', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--ivory);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body {
    font-family: var(--sans);
    color: var(--noir);
    overflow-x: hidden;
  }
  ::selection { background: var(--bronze); color: var(--noir); }
  a { color: inherit; }
  button { font-family: var(--sans); }

  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-33.33%); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section { animation: fadeIn 0.8s ease; }

  .gallery-btn {
    width: 48px; height: 48px; background: transparent;
    border: 1px solid rgba(245,241,234,0.3); color: var(--ivory);
    cursor: pointer; font-size: 16px; transition: all 0.25s;
    font-family: var(--sans);
  }
  .gallery-btn:hover {
    background: var(--bronze); color: var(--noir); border-color: var(--bronze);
  }

  input:focus { outline: 1px solid var(--bronze); outline-offset: 2px; }

  /* RESPONSIVE — mobile-first priority */
  @media (max-width: 900px) {
    .nav-links { display: none !important; }
    .nav-burger { display: block !important; }
    .hero-grid { grid-template-columns: 1fr !important; min-height: auto !important; }
    .hero-text { padding: 120px 24px 48px !important; }
    .hero-image { aspect-ratio: 3/4; }
    .hero-scroll { display: none !important; }
    .services-grid, .gallery-grid, .philo-grid, .booking-grid, .footer-grid {
      grid-template-columns: 1fr !important; gap: 48px !important;
    }
    .section { padding: 80px 24px !important; }
    .philo-stats { grid-template-columns: repeat(3, 1fr) !important; gap: 16px !important; }
    .footer-bottom { flex-direction: column; }
  }
  @media (max-width: 500px) {
    .philo-stats { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
